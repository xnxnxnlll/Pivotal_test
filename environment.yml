name: zephyr-taxprofile
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  # discovery (CLI; no maintained pip API)
  - kraken2
  - bracken
  - sourmash
  # optional CLI confirmation / QC if you prefer binaries over mappy/pysam,
  # or want BAMs for IGV / mosdepth
  - minimap2
  - samtools
  - mosdepth
  - seqkit
  - csvtk
  - nanoplot
  # python core (also in requirements.txt for a pip-only install)
  - pip
  - pip:
      - mappy>=2.28
      - pysam>=0.22
      - pandas
      - numpy
      - matplotlib
      - biopython
      - pyyaml
      - pytest
